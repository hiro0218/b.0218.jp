name: Weekly NPM Update

on:
  schedule:
    - cron: '0 9 * * 1'
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  npm-update:
    env:
      pr_title: '[Automated] Update NPM dependencies'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          sparse-checkout: |
            package.json
            package-lock.json
            .node-version

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Get changed files
        id: changed-files
        run: |
          current_branch=${GITHUB_REF#refs/heads/}
          default_branch=${{ github.event.repository.default_branch }}

          # 監視対象ファイルリスト
          files_to_check=("package.json" "package-lock.json")
          any_changed=false

          # 各ファイルの変更を検知
          for file in "${files_to_check[@]}"; do
            if git diff --name-only "origin/${default_branch}...${current_branch}" | grep -Fxq "$file"; then
              echo "${file//-/_}_changed=true" >> "$GITHUB_OUTPUT"
              any_changed=true
            else
              echo "${file//-/_}_changed=false" >> "$GITHUB_OUTPUT"
            fi
          done

          # いずれかのファイルが変更された場合のフラグ
          echo "any_changed=$any_changed" >> "$GITHUB_OUTPUT"

      - name: Decide whether to update
        id: should-update
        env:
          ANY_CHANGED: ${{ steps.changed-files.outputs.any_changed }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "schedule" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" || "$ANY_CHANGED" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Synchronize lockfile
        if: steps.should-update.outputs.run == 'true'
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Update packages
        if: steps.should-update.outputs.run == 'true'
        run: npm update --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Normalize lockfile
        if: steps.should-update.outputs.run == 'true'
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify lockfile
        if: steps.should-update.outputs.run == 'true'
        run: npm ci --ignore-scripts --dry-run --no-audit --no-fund

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: ${{ steps.git-check.outputs.changes == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.BOT_TOKEN }}
          base: develop
          add-paths: package-lock.json
          commit-message: Update npm dependencies
          title: ${{ env.pr_title }}
          body: 'Automated changes by GitHub Actions'
          branch: automated-npm-update
          delete-branch: true

name: 'PR Validation'

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: false

      - name: actionlint
        run: |
          # actionlint v1.7.12 は GitHub Actions の parallel/background/wait-all
          # ステップ構文（2026-06-25 GA）のスキーマに未対応で誤検知するため一時的に抑制する。
          # 2件目の ignore は「run/uses のないステップ」全般に一致するため、
          # parallel/wait-all 以外の本来の記述ミスも検出できなくなる副作用がある。
          # actionlint がこの構文に対応したバージョンを出したら両方の -ignore を削除すること。
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 \
            -ignore 'unexpected key "background"' \
            -ignore 'step must run script with "run" section or run action with "uses" section'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - id: cache-node-modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('.node-version') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Biome
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - id: cache-node-modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('.node-version') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Generate Panda CSS
        run: npx panda codegen

      - name: Create dist fixtures
        run: |
          mkdir -p dist
          echo '{}' > dist/search-index.json
          echo '[]' > dist/search-data.json
          echo '[]' > dist/pages.json
          echo '[]' > dist/posts-list.json
          echo '{}' > dist/posts-popular.json
          echo '{}' > dist/posts-similarity.json
          echo '{}' > dist/tags.json
          echo '[]' > dist/tags-with-count.json
          echo '{"CSS":"development","AI":"technology","雑記":"other"}' > dist/tag-categories.json
          echo '{}' > dist/tags-similarity.json

      - name: Vitest
        run: npm test

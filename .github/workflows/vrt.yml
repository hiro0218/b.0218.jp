name: 'Storybook VRT'

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  vrt:
    runs-on: ubuntu-latest
    outputs:
      artifact-url: ${{ steps.artifact.outputs.artifact-url }}
      outcome: ${{ steps.vrt.outcome }}
      section: ${{ steps.diffs.outputs.section }}
    steps:
      - uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
          submodules: true

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - id: cache-node-modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('.node-version') }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-${{ hashFiles('.node-version') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        background: true
        run: npx playwright install --with-deps chromium

      - name: Restore Storybook build cache
        id: sb-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: storybook-static
          key: storybook-${{ runner.os }}-${{ hashFiles('.storybook/**', 'src/components/UI/**/*.{ts,tsx,css}', 'src/stories/**/*.{ts,tsx,css}', 'src/lib/**/*.{ts,tsx}', 'src/ui/**/*.{ts,tsx}', 'panda.config.mts', 'package-lock.json') }}

      - name: Build Storybook
        if: steps.sb-cache.outputs.cache-hit != 'true'
        run: npm run vrt:build

      - name: Download baseline snapshots from master
        if: github.event_name == 'pull_request'
        background: true
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: vrt.yml
          branch: master
          name: vrt-baseline
          path: tests/vrt/__snapshots__
          if_no_artifact_found: warn

      - name: Wait for background setup steps
        wait-all:

      - name: Run Playwright VRT
        id: vrt
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run vrt
          else
            npm run vrt -- --update-snapshots
          fi
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Upload baseline snapshots (master branch)
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master' && steps.vrt.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vrt-baseline
          path: tests/vrt/__snapshots__
          retention-days: 90
          overwrite: true

      - name: Collect failed snapshots
        id: diffs
        if: always() && github.event_name == 'pull_request'
        shell: bash
        run: |
          section=""
          if [ -d test-results ] && [ -f storybook-static/index.json ]; then
            ids=$(find test-results -name '*-diff.png' -type f \
              | sed -E 's#.*/([^/]+)-diff\.png$#\1#' | sort -u)
            if [ -n "$ids" ]; then
              ids_json=$(printf '%s\n' "$ids" | jq -R . | jq -s .)
              list=$(jq -r --argjson ids "$ids_json" '
                $ids[] as $id
                | if .entries[$id]
                  then "\(.entries[$id].importPath)\t\(.entries[$id].title) / \(.entries[$id].name)"
                  else "\($id)\t" end
              ' storybook-static/index.json | while IFS=$'\t' read -r path label; do
                if [ -n "$label" ]; then
                  echo "- \`${path#./}\` — ${label}"
                else
                  echo "- \`${path}\` (story 情報の解決に失敗)"
                fi
              done)
              if [ -n "$list" ]; then
                section=$'### 差分があったスナップショット\n\n'"$list"
              fi
            fi
          fi
          {
            echo 'section<<EOF'
            echo "$section"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload diff report (PR)
        id: artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vrt-diff-${{ github.event.pull_request.number }}
          path: |
            test-results
            playwright-report
          retention-days: 14
          if-no-files-found: ignore

  vrt-comment:
    runs-on: ubuntu-latest
    needs: vrt
    if: always() && github.event_name == 'pull_request' && needs.vrt.result != 'cancelled'
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR with VRT result
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: storybook-vrt
          message: |
            ## Storybook VRT

            > **結果**: ${{ (needs.vrt.outputs.outcome == 'success' && '差分なし') || (needs.vrt.outputs.outcome == 'failure' && '差分あり / 要確認') || 'ビルド失敗 / VRT 実行不可' }}

            ### リンク

            | 種別 | 参照先 |
            | --- | --- |
            | 差分 artifact | [vrt-diff-${{ github.event.pull_request.number }}](${{ needs.vrt.outputs.artifact-url }}) |
            | HTML レポート | artifact 内の `playwright-report/index.html` |
            | 実行ログ | [run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ${{ needs.vrt.outputs.section }}

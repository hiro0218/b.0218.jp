name: 'dependency-cruiser-report'

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: '.node-version'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Detect changed files
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git diff --name-only --diff-filter=AM "origin/$BASE_REF"...HEAD \
            | grep -E 'src/.*\.(js|cjs|mjs|jsx|ts|tsx)$' \
            | grep -v '\.\(spec\|test\)\.' > changed-files.txt || true

          if [[ ! -s changed-files.txt ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          node <<'NODE' > focus.txt
          const fs = require('fs');
          const escapeRegExp = value => value.replace(/[\\^$.*+?()[\]{}|]/g, '\\$&');
          const files = fs.readFileSync('changed-files.txt', 'utf8')
            .split(/\r?\n/)
            .filter(Boolean);

          process.stdout.write(files.map(escapeRegExp).join('|'));
          NODE

      - name: Run dependency-cruiser
        if: steps.detect.outputs.skip == 'false'
        run: |
          mapfile -t files < changed-files.txt
          focus="$(cat focus.txt)"

          # 変更ファイルの依存関係を JSON で取得
          npx --no-install depcruise --cache -X "^node_modules" --max-depth 3 \
            --focus "$focus" -T json "${files[@]}" > dep-result.json

          # 影響範囲（変更ファイルに依存しているモジュール）を JSON で取得
          npx --no-install depcruise --cache -X "^node_modules" --max-depth 2 \
            --reaches "$focus" src -T json > dep-reaches.json 2>/dev/null || true

          # JSON バリデーション（失敗時は空にする）
          if ! jq empty dep-reaches.json 2>/dev/null; then
            rm -f dep-reaches.json
          fi

      - name: Build comment
        if: steps.detect.outputs.skip == 'false'
        run: |
          cat > comment.md << 'HEADER'
          <!-- dependency-cruiser report -->
          ## 依存関係チェック
          HEADER

          # --- 違反セクション ---
          error_count=$(jq '.summary.error // 0' dep-result.json)
          warn_count=$(jq '.summary.warn // 0' dep-result.json)
          total_violations=$((error_count + warn_count))

          if [[ $total_violations -eq 0 ]]; then
            echo -e '\n**違反なし** — 依存ルールへの違反は検出されませんでした。\n' >> comment.md
          else
            echo -e "\n**${total_violations}件の違反**（error: ${error_count} / warn: ${warn_count}）\n" >> comment.md

            # 違反テーブル（error と warn のみ。info はノイズになるため除外）
            echo '| 深刻度 | ルール | 対象ファイル | 依存先 | 説明 |' >> comment.md
            echo '|---|---|---|---|---|' >> comment.md
            jq -r '
              (.summary.violations // [])[]
              | select(.rule.severity == "error" or .rule.severity == "warn")
              | "| \(.rule.severity) | `\(.rule.name)` | `\(.from)` | `\(.to)` | \(.comment // "-") |"
            ' dep-result.json >> comment.md
            echo '' >> comment.md
          fi

          # --- 影響範囲セクション ---
          if [[ -s dep-reaches.json ]]; then
            reaches_count=$(jq '[.modules[].source] | length' dep-reaches.json 2>/dev/null || echo "0")

            if [[ $reaches_count -gt 0 ]]; then
              # 変更ファイル自身を除外して、影響を受ける側のモジュールだけ抽出
              affected=$(jq -r '[.modules[].source] | sort | .[]' dep-reaches.json \
                | grep -v -F -f changed-files.txt || true)

              if [[ -n "$affected" ]]; then
                affected_count=$(echo "$affected" | wc -l | tr -d ' ')
                echo -e "---\n" >> comment.md
                echo "<details>" >> comment.md
                echo "<summary><strong>影響範囲</strong> — 変更ファイルに依存している ${affected_count} モジュール</summary>" >> comment.md
                echo "" >> comment.md
                echo "$affected" | sed 's/^/- `/' | sed 's/$/`/' >> comment.md
                echo "" >> comment.md
                echo "</details>" >> comment.md
                echo "" >> comment.md
              fi
            fi
          fi

          # --- 依存グラフ（折りたたみ、サイズ制限付き） ---
          mermaid_output=$(npx --no-install depcruise-fmt -T mermaid dep-result.json)
          mermaid_size=${#mermaid_output}

          echo -e "---\n" >> comment.md
          echo '<details>' >> comment.md
          echo '<summary>依存グラフ</summary>' >> comment.md
          echo '' >> comment.md
          echo '```mermaid' >> comment.md
          if [[ $mermaid_size -gt 50000 ]]; then
            echo "$mermaid_output" | head -c 50000 >> comment.md
            echo '' >> comment.md
            echo '%% グラフが大きいため省略されました' >> comment.md
          else
            echo "$mermaid_output" >> comment.md
          fi
          echo '```' >> comment.md
          echo '' >> comment.md
          echo '</details>' >> comment.md

          cat comment.md

      - name: Build comment (no files)
        if: steps.detect.outputs.skip == 'true'
        run: |
          cat > comment.md << 'EOF'
          <!-- dependency-cruiser report -->
          ## 依存関係チェック

          依存関係を分析する対象のファイルがありませんでした。
          EOF

      - name: Upload comment
        uses: actions/upload-artifact@v4
        with:
          name: dependency-cruiser-comment
          path: comment.md
          if-no-files-found: error

  comment:
    runs-on: ubuntu-latest
    needs: analyze
    if: needs.analyze.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - name: Download comment
        uses: actions/download-artifact@v8
        with:
          name: dependency-cruiser-comment
          path: dependency-cruiser-comment

      - name: Update comment
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_PATH: dependency-cruiser-comment/comment.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- dependency-cruiser report -->';
            const issueNumber = Number(process.env.PR_NUMBER);
            const body = fs.readFileSync(process.env.COMMENT_PATH, 'utf8');
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existingComment = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
              core.info(`Updated dependency-cruiser comment ${existingComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
              core.info('Created dependency-cruiser comment');
            }

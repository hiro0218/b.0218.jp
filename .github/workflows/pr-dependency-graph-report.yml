name: 'dependency-cruiser-report'

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run dependency-cruiser
        run: |
          files="$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD \
            | grep -E 'src/.*\.(js|cjs|mjs|jsx|ts|tsx)$' \
            | grep -v '\.\(spec\|test\)\.' \
            | tr '\n' ' ' | xargs)"
          includeOnlyOption=$(echo "$files" | sed 's/ /|/g')
          echo "$files"

          if [[ -z "$files" ]]; then
            echo "対象ファイルなし"
            exit 0
          fi

          # 1. 違反チェック（markdown レポート）
          bunx depcruise --cache -X "^node_modules" --max-depth 3 \
            --focus "$includeOnlyOption" -T json $files > _temp.json

          bunx depcruise-fmt -T markdown _temp.json > result.md

          # 2. 影響範囲（変更ファイルに依存しているモジュールを抽出）
          bunx depcruise --cache -X "^node_modules" --max-depth 2 \
            --reaches "$includeOnlyOption" src -T json > _reaches.json 2>/dev/null || true

          if [[ -s _reaches.json ]]; then
            echo -e '\n---\n' >> result.md
            echo -e '### 影響範囲（変更ファイルに依存しているモジュール）\n' >> result.md
            bunx depcruise-fmt -T markdown _reaches.json >> result.md
          fi

          # 3. 依存グラフ（折りたたみ）
          echo -e '\n---\n' >> result.md
          echo -e '<details>\n' >> result.md
          echo -e '<summary>依存グラフ（Mermaid）</summary>\n' >> result.md
          echo -e '\n```mermaid' >> result.md
          bunx depcruise-fmt -T mermaid _temp.json >> result.md
          echo -e '\n```\n' >> result.md
          echo -e '</details>' >> result.md

          echo "files=$files" >> $GITHUB_ENV
          cat result.md

      - name: Initial Markdown File
        run: |
          echo '<!-- dependency-cruiser report -->' > comment.md
          echo '' >> comment.md

      - name: Generate Markdown Text
        run: |
          if [[ "${{ env.files }}" != "" ]]; then
            cat result.md >> comment.md
          else
            echo '依存関係を分析する対象のファイルがありませんでした。' >> comment.md
          fi

      - name: Write Comment (Use find-comment)
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: <!-- dependency-cruiser report -->

      - name: Update Comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace
          token: ${{ secrets.GITHUB_TOKEN }}

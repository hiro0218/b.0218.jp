name: 'E2E'

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3.0.0

      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('.node-version') }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-${{ hashFiles('.node-version') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Panda CSS
        run: npx panda codegen

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: next-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            next-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Run Playwright E2E
        id: e2e
        run: npm run e2e
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Upload E2E report
        id: artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
          path: |
            playwright-report-e2e
            test-results-e2e
          retention-days: 14
          if-no-files-found: ignore

      - name: Comment PR with E2E result
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: e2e
          message: |
            ## E2E

            > **結果**: ${{ steps.e2e.outcome == 'success' && '成功' || '失敗 / 要確認' }}

            ### リンク

            | 種別 | 参照先 |
            | --- | --- |
            | レポート artifact | [e2e-report-${{ github.event.pull_request.number }}](${{ steps.artifact.outputs.artifact-url }}) |
            | HTML レポート | artifact 内の `playwright-report-e2e/index.html` |
            | 実行ログ | [run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
